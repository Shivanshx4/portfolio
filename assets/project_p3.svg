<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#08080c"/>
  
  <!-- Cyber Map grid (Hexagonal or topological layout) -->
  <g stroke="#121820" stroke-width="1.5">
    <path d="M 50,100 L 750,100 M 50,180 L 750,180 M 50,260 L 750,260 M 50,340 L 750,340 M 50,420 L 750,420 M 50,500 L 750,500"/>
    <path d="M 100,50 L 100,550 M 200,50 L 200,550 M 300,50 L 300,550 M 400,50 L 400,550 M 500,50 L 500,550 M 600,50 L 600,550 M 700,50 L 700,550"/>
    <!-- Diagonal streets outlines -->
    <path d="M 50,50 L 550,550" stroke="#1b2838" stroke-dasharray="8,8"/>
    <path d="M 700,50 L 200,550" stroke="#1b2838" stroke-dasharray="8,8"/>
  </g>
  
  <!-- Topological lake / boundary outline -->
  <path d="M 450,220 C 500,180 580,210 620,170 C 660,130 730,160 760,120 L 760,550 L 400,550 Z" fill="#0d1b2a" stroke="#1b3a4b" stroke-width="2" opacity="0.8"/>
  <text x="600" y="450" font-family="sans-serif" font-weight="bold" font-size="20" fill="#1b3a4b">PACIFIC WATERWAYS</text>
  
  <!-- Crime Hotspots (Semi-transparent glowing circles) -->
  <!-- Hotspot 1 -->
  <circle cx="280" cy="180" r="70" fill="#ff5f56" fill-opacity="0.15" stroke="#ff5f56" stroke-width="2" stroke-dasharray="4,2"/>
  <circle cx="280" cy="180" r="30" fill="#ff5f56" fill-opacity="0.3"/>
  <circle cx="280" cy="180" r="6" fill="#ff5f56"/>
  <!-- Hotspot 2 -->
  <circle cx="480" cy="340" r="90" fill="#ff5f56" fill-opacity="0.12" stroke="#ff5f56" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="480" cy="340" r="40" fill="#ff5f56" fill-opacity="0.25"/>
  <circle cx="480" cy="340" r="6" fill="#ff5f56"/>
  <!-- Hotspot 3 -->
  <circle cx="200" cy="420" r="50" fill="#ff5f56" fill-opacity="0.15" stroke="#ff5f56" stroke-width="1.5" stroke-dasharray="4,2"/>
  <circle cx="200" cy="420" r="20" fill="#ff5f56" fill-opacity="0.3"/>
  <circle cx="200" cy="420" r="6" fill="#ff5f56"/>

  <!-- Analytics Hud Card overlays -->
  <!-- Top Left Indicator -->
  <rect x="50" y="50" width="220" height="70" rx="4" fill="#0f0f15" fill-opacity="0.9" stroke="#1d2833" stroke-width="1.5"/>
  <text x="70" y="80" font-family="monospace" font-size="11" fill="#666677">PREDICTIVE ACCURACY</text>
  <text x="70" y="105" font-family="sans-serif" font-weight="bold" font-size="22" fill="#00ffa3">85.42%</text>
  
  <!-- Right Dashboard stats overlay -->
  <rect x="500" y="50" width="250" height="200" rx="6" fill="#0f0f15" fill-opacity="0.9" stroke="#1d2833" stroke-width="1.5"/>
  <text x="525" y="85" font-family="sans-serif" font-weight="bold" font-size="14" fill="#fff">HOTSPOT TRENDS</text>
  
  <!-- Tiny Bar charts -->
  <g fill="#ff5f56">
    <rect x="525" y="110" width="18" height="80" rx="2"/>
    <rect x="555" y="130" width="18" height="60" rx="2" fill="#ffbd2e"/>
    <rect x="585" y="100" width="18" height="90" rx="2"/>
    <rect x="615" y="150" width="18" height="40" rx="2" fill="#00ffa3"/>
    <rect x="645" y="125" width="18" height="65" rx="2"/>
    <rect x="675" y="140" width="18" height="50" rx="2" fill="#00ffa3"/>
    <rect x="705" y="160" width="18" height="30" rx="2" fill="#00ffa3"/>
  </g>
  <!-- Chart axis labels -->
  <text x="525" y="210" font-family="monospace" font-size="9" fill="#555566">MON</text>
  <text x="555" y="210" font-family="monospace" font-size="9" fill="#555566">TUE</text>
  <text x="585" y="210" font-family="monospace" font-size="9" fill="#555566">WED</text>
  <text x="615" y="210" font-family="monospace" font-size="9" fill="#555566">THU</text>
  <text x="645" y="210" font-family="monospace" font-size="9" fill="#555566">FRI</text>
  <text x="675" y="210" font-family="monospace" font-size="9" fill="#555566">SAT</text>
  <text x="705" y="210" font-family="monospace" font-size="9" fill="#555566">SUN</text>
  
  <!-- Target annotations -->
  <g stroke="#00e5ff" stroke-width="1.5">
    <!-- Focal crosshair mapping to Hotspot 1 -->
    <draw-crosshair x="280" y="180"/>
    <line x1="280" y1="120" x2="280" y2="150"/>
    <line x1="280" y1="210" x2="280" y2="240"/>
    <line x1="220" y1="180" x2="250" y2="180"/>
    <line x1="310" y1="180" x2="340" y2="180"/>
  </g>
  <text x="310" y="165" font-family="monospace" font-size="10" fill="#00e5ff">HOTSPOT_ALPHA: CRITICAL</text>
</svg>
