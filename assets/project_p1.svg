<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#08080c"/>
  <!-- Grid pattern background -->
  <g stroke="#1a1a24" stroke-width="1" opacity="0.4">
    <path d="M 0,50 H 800 M 0,100 H 800 M 0,150 H 800 M 0,200 H 800 M 0,250 H 800 M 0,300 H 800 M 0,350 H 800 M 0,400 H 800 M 0,450 H 800 M 0,500 H 800 M 0,550 H 800"/>
    <path d="M 50,0 V 600 M 100,0 V 600 M 150,0 V 600 M 200,0 V 600 M 250,0 V 600 M 300,0 V 600 M 350,0 V 600 M 400,0 V 600 M 450,0 V 600 M 500,0 V 600 M 550,0 V 600 M 600,0 V 600 M 650,0 V 600 M 700,0 V 600 M 750,0 V 600"/>
  </g>
  <!-- Browser frame -->
  <rect x="40" y="40" width="720" height="520" rx="8" fill="#0f0f15" stroke="#222230" stroke-width="2"/>
  <!-- Browser top bar -->
  <path d="M 40,80 H 760" stroke="#222230" stroke-width="2"/>
  <circle cx="65" cy="60" r="6" fill="#ff5f56"/>
  <circle cx="85" cy="60" r="6" fill="#ffbd2e"/>
  <circle cx="105" cy="60" r="6" fill="#27c93f"/>
  <rect x="140" y="50" width="400" height="20" rx="4" fill="#0b0b0f" stroke="#1d1d28" stroke-width="1"/>
  <text x="160" y="64" font-family="monospace" font-size="10" fill="#666677">https://techbrillsolutions.com</text>
  
  <!-- Website Content Preview -->
  <!-- Logo/Header -->
  <text x="80" y="130" font-family="sans-serif" font-weight="bold" font-size="22" fill="#00ffa3">TechBrill</text>
  <text x="180" y="130" font-family="sans-serif" font-weight="bold" font-size="22" fill="#fff">Solutions</text>
  <!-- Nav links mock -->
  <rect x="520" y="118" width="60" height="12" rx="3" fill="#222230"/>
  <rect x="600" y="118" width="60" height="12" rx="3" fill="#222230"/>
  <rect x="680" y="118" width="50" height="12" rx="3" fill="#00ffa3" opacity="0.8"/>
  
  <!-- Hero Area -->
  <text x="80" y="240" font-family="sans-serif" font-weight="bold" font-size="36" fill="#fff">WE TURN VISION</text>
  <text x="80" y="290" font-family="sans-serif" font-weight="bold" font-size="36" fill="#00e5ff">INTO VELOCITY.</text>
  <text x="80" y="340" font-family="sans-serif" font-size="14" fill="#888899">High-performance scalable applications built with React, Node, and MongoDB.</text>
  
  <!-- Interactive elements -->
  <rect x="80" y="380" width="160" height="40" rx="20" fill="none" stroke="#00ffa3" stroke-width="2"/>
  <text x="120" y="405" font-family="sans-serif" font-weight="bold" font-size="14" fill="#00ffa3">EXPLORE WORK</text>
  
  <!-- Sleek float card in browser -->
  <rect x="460" y="200" width="250" height="280" rx="12" fill="#141420" stroke="#00e5ff" stroke-width="1.5" opacity="0.9"/>
  <!-- Mini dashboard in card -->
  <text x="490" y="240" font-family="sans-serif" font-weight="bold" font-size="16" fill="#fff">Network Traffic</text>
  <path d="M 480,420 L 520,380 L 560,400 L 600,320 L 640,360 L 680,290" fill="none" stroke="#00e5ff" stroke-width="3"/>
  <path d="M 480,420 L 520,380 L 560,400 L 600,320 L 640,360 L 680,290 L 680,440 L 480,440 Z" fill="#00e5ff" opacity="0.1"/>
  <circle cx="680" cy="290" r="5" fill="#00ffa3"/>
  
  <!-- Text indicators -->
  <text x="490" y="460" font-family="monospace" font-size="12" fill="#00ffa3">Active Users: 500+</text>
  <text x="610" y="460" font-family="monospace" font-size="12" fill="#888899">99.9% Uptime</text>
</svg>
