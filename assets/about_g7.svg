<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#101014"/>
  <!-- Horizon line -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#333344" stroke-width="1.5"/>
  <!-- Perspective lines emanating from horizon center -->
  <g stroke="#22222e" stroke-width="1">
    <line x1="200" y1="40" x2="-100" y2="150"/>
    <line x1="200" y1="40" x2="-50" y2="150"/>
    <line x1="200" y1="40" x2="0" y2="150"/>
    <line x1="200" y1="40" x2="50" y2="150"/>
    <line x1="200" y1="40" x2="100" y2="150"/>
    <line x1="200" y1="40" x2="150" y2="150"/>
    <line x1="200" y1="40" x2="200" y2="150"/>
    <line x1="200" y1="40" x2="250" y2="150"/>
    <line x1="200" y1="40" x2="300" y2="150"/>
    <line x1="200" y1="40" x2="350" y2="150"/>
    <line x1="200" y1="40" x2="400" y2="150"/>
    <line x1="200" y1="40" x2="450" y2="150"/>
    <line x1="200" y1="40" x2="500" y2="150"/>
  </g>
  <!-- Horizontal grid dividers (decreasing spacing towards horizon) -->
  <g stroke="#22222e" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="65" x2="400" y2="65"/>
    <line x1="0" y1="85" x2="400" y2="85"/>
    <line x1="0" y1="110" x2="400" y2="110"/>
    <line x1="0" y1="140" x2="400" y2="140"/>
  </g>
  <!-- Sleek cyan cyber lines -->
  <g stroke="#00e5ff" stroke-width="2" opacity="0.6">
    <line x1="200" y1="40" x2="100" y2="150"/>
    <line x1="200" y1="40" x2="300" y2="150" stroke="#00ffa3"/>
  </g>
  <!-- Decorative target indicators -->
  <circle cx="200" cy="40" r="3" fill="#00e5ff"/>
  <text x="15" y="25" font-family="monospace" font-size="9" fill="#555566">COORD: GRID_PERSPECTIVE_Z</text>
  <text x="310" y="25" font-family="monospace" font-size="9" fill="#00ffa3">INF_LIMIT: TRUE</text>
</svg>
